name: Test

on:
  workflow_call:
    inputs:
      run-fuzz-tests:
        description: Run fuzz tests recursively
        required: false
        type: boolean
        default: true
      fuzz-with-race:
        description: Run fuzz tests with race detector
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  race-test:
    name: Test with race detector
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go cache
        uses: capnspacehook/cache-go/restore@9fca1a5a6020fb66aa66c17d3049cc69fd3c80d9 # v2.0.2

      - name: Run tests
        run: |
          go test -race -timeout 10m -v ./...

      - name: Save Go cache
        if: always()
        uses: capnspacehook/cache-go/save@9fca1a5a6020fb66aa66c17d3049cc69fd3c80d9 # v2.0.2

  fuzz:
    name: Fuzz code
    runs-on: ubuntu-latest
    needs: race-test
    if: inputs.run-fuzz-tests
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go cache
        uses: capnspacehook/cache-go/restore@9fca1a5a6020fb66aa66c17d3049cc69fd3c80d9 # v2.0.2
        with:
          cache-fuzz-corpus: true

      - name: Run fuzz tests
        run: |
          RACE_FLAG="${{ inputs.fuzz-with-race && '-race' || '' }}"
          
          find . -type f -name '*_test.go' -exec grep -l '^func Fuzz' {} \; | while read -r FILE; do
              grep '^func Fuzz' "$FILE" | sed 's/func \(Fuzz[^(]*\).*/\1/' | while read -r FUZZ_NAME; do
                  echo "Running fuzz test: $FUZZ_NAME in $FILE"
                  TEST_DIR=$(dirname "$FILE")
                  (cd "$TEST_DIR" && go test "$RACE_FLAG" -run DONOT -fuzz="^${FUZZ_NAME}$" -fuzztime=10m) || exit 1
              done
          done

      - name: Save Go cache
        if: always()
        uses: capnspacehook/cache-go/save@9fca1a5a6020fb66aa66c17d3049cc69fd3c80d9 # v2.0.2
        with:
          cache-fuzz-corpus: true
